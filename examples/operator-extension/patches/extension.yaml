apiVersion: operator.gardener.cloud/v1alpha1
kind: Extension
metadata:
  name: otelcol
  annotations:
    security.gardener.cloud/pod-security-enforce: privileged
spec:
  deployment:
    extension:
      helm:
        ociRepository:
          ref: registry.local.gardener.cloud:5001/helm-charts/gardener-extension-otelcol:v0.1.0-dev
    admission:
      runtimeCluster:
        helm:
          ociRepository:
            ref: registry.local.gardener.cloud:5001/helm-charts/gardener-extension-otelcol-admission-runtime:v0.1.0-dev
      virtualCluster:
        helm:
          ociRepository:
            ref: registry.local.gardener.cloud:5001/helm-charts/gardener-extension-otelcol-admission-virtual:v0.1.0-dev
      values: {}
  resources:
    - kind: Extension
      type: otelcol
      workerlessSupported: true
      clusterCompatibility:
        - shoot
      lifecycle:
        reconcile: BeforeKubeAPIServer
        delete: AfterKubeAPIServer
        migrate: AfterKubeAPIServer
